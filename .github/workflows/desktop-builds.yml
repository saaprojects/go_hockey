name: Desktop Builds

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish assets to, like v0.1.0
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release_tag.outputs.tag }}

    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure GitHub release exists
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          draft: false
          prerelease: false
          overwrite_files: true

  build-for-windows:
    name: Windows Executable
    needs: prepare-release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        shell: pwsh
        run: go test ./...

      - name: Build Windows executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows | Out-Null
          go build -trimpath -ldflags="-s -w" -o dist\windows\GoHockey.exe .\hockey-v2
          Compress-Archive -LiteralPath dist\windows\GoHockey.exe -DestinationPath dist\GoHockey-windows-amd64.zip -Force

      - name: Upload Windows asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          files: dist/GoHockey-windows-amd64.zip
          fail_on_unmatched_files: true
          overwrite_files: true

  build-for-macos:
    name: MacOS App (Apple Silicon)
    needs: prepare-release
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        shell: bash
        run: go test ./...

      - name: Build macOS app bundle
        shell: bash
        env:
          CGO_ENABLED: "1"
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail

          APP_NAME="GoHockey"
          APP_DIR="dist/${APP_NAME}.app"
          BIN_PATH="${APP_DIR}/Contents/MacOS/${APP_NAME}"
          PLIST_PATH="${APP_DIR}/Contents/Info.plist"

          mkdir -p "${APP_DIR}/Contents/MacOS" "${APP_DIR}/Contents/Resources"

          cat > "${PLIST_PATH}" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>${APP_NAME}</string>
            <key>CFBundleIdentifier</key>
            <string>com.gohockey.app</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>Go Hockey</string>
            <key>CFBundleDisplayName</key>
            <string>Go Hockey</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${RELEASE_TAG}</string>
            <key>CFBundleVersion</key>
            <string>${BUILD_NUMBER}</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          printf "APPL????" > "${APP_DIR}/Contents/PkgInfo"

          go build -trimpath -ldflags="-s -w" -o "${BIN_PATH}" ./hockey-v2
          chmod +x "${BIN_PATH}"

      - name: Validate macOS bundle
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="dist/GoHockey.app"
          BIN_PATH="${APP_DIR}/Contents/MacOS/GoHockey"
          PLIST_PATH="${APP_DIR}/Contents/Info.plist"

          echo "== file =="
          file "${BIN_PATH}"

          echo "== lipo -info =="
          lipo -info "${BIN_PATH}" || true

          echo "== plist validation =="
          plutil -lint "${PLIST_PATH}"

      - name: Ad-hoc sign app for testing
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="dist/GoHockey.app"

          codesign --force --deep --sign - "${APP_DIR}"

      - name: Verify code signature
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="dist/GoHockey.app"

          codesign --verify --deep --strict --verbose=2 "${APP_DIR}"
          spctl --assess --type execute --verbose=4 "${APP_DIR}" || true

      - name: Package macOS app
        shell: bash
        run: |
          set -euo pipefail
          ditto -c -k --sequesterRsrc --keepParent "dist/GoHockey.app" "dist/GoHockey-macos-arm64.zip"

      - name: Upload macOS asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          files: dist/GoHockey-macos-arm64.zip
          fail_on_unmatched_files: true
          overwrite_files: true